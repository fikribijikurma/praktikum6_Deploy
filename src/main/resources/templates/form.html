<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Form Input</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="p-5">
<div class="container border p-4 bg-light">
    <h5>Form Input Mahasiswa</h5>
    <form th:action="@{/save}" th:object="${mahasiswa}" method="post">
        <div class="mb-3">
            <label>Nama:</label>
            <input type="text" th:field="*{nama}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>NIM:</label>
            <input type="text" th:field="*{nim}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Jenis Kelamin:</label><br>
            <input type="radio" th:field="*{jenisKelamin}" value="Laki-laki"> Laki-laki <br>
            <input type="radio" th:field="*{jenisKelamin}" value="Perempuan"> Perempuan
        </div>
        <button type="submit" class="btn btn-primary">Submit</button>
    </form>
    <br>
    <a th:href="@{/home}" class="text-primary text-decoration-none">Kembali ke Home</a>
</div>
</body>
</html>
